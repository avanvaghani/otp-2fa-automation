<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo 2FA Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; font-size: 14px; color: #ccc; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border 0.3s;
    }
    input:focus { border-color: #7c4dff; }
    button {
      width: 100%;
      padding: 14px;
      background: #7c4dff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #651fff; }
    .message {
      text-align: center;
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }
    .message.error { background: rgba(255, 82, 82, 0.2); color: #ff5252; }
    .message.success { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .hidden { display: none; }
    .step-indicator {
      text-align: center;
      margin-bottom: 20px;
      font-size: 13px;
      color: #7c4dff;
    }
    .dashboard {
      text-align: center;
    }
    .dashboard h2 { margin-bottom: 16px; color: #4caf50; }
    .dashboard p { color: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Step 1: Login Form -->
    <div id="login-step">
      <h1>Secure Login</h1>
      <p class="subtitle">Demo 2FA Authentication</p>
      <div class="step-indicator">Step 1 of 2 — Enter Credentials</div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" data-testid="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" data-testid="password" />
      </div>
      <button id="login-btn" data-testid="login-btn">Login</button>
      <div id="login-message" class="message hidden"></div>
    </div>

    <!-- Step 2: OTP Verification -->
    <div id="otp-step" class="hidden">
      <h1>Verify OTP</h1>
      <p class="subtitle">Enter the 6-digit code from your authenticator app</p>
      <div class="step-indicator">Step 2 of 2 — Two-Factor Authentication</div>
      <div class="form-group">
        <label for="otp">One-Time Password</label>
        <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6" data-testid="otp-input" />
      </div>
      <button id="verify-btn" data-testid="verify-btn">Verify</button>
      <div id="otp-message" class="message hidden"></div>
    </div>

    <!-- Step 3: Dashboard (after successful login) -->
    <div id="dashboard" class="hidden">
      <div class="dashboard">
        <h2 data-testid="dashboard-title">Welcome to Dashboard!</h2>
        <p>You have successfully logged in with 2FA.</p>
        <p style="margin-top: 16px; font-size: 13px; color: #888;">
          User: <span data-testid="logged-user">testuser</span>
        </p>
      </div>
    </div>
  </div>

  <script>
    const loginStep = document.getElementById('login-step');
    const otpStep = document.getElementById('otp-step');
    const dashboard = document.getElementById('dashboard');
    const loginMsg = document.getElementById('login-message');
    const otpMsg = document.getElementById('otp-message');

    function showMessage(el, text, type) {
      el.textContent = text;
      el.className = `message ${type}`;
      el.classList.remove('hidden');
    }

    // Step 1: Login
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          loginStep.classList.add('hidden');
          otpStep.classList.remove('hidden');
        } else {
          showMessage(loginMsg, data.message, 'error');
        }
      } catch (err) {
        showMessage(loginMsg, 'Server error', 'error');
      }
    });

    // Step 2: OTP Verification
    document.getElementById('verify-btn').addEventListener('click', async () => {
      const otp = document.getElementById('otp').value;

      try {
        const res = await fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ otp }),
        });
        const data = await res.json();

        if (data.success) {
          otpStep.classList.add('hidden');
          dashboard.classList.remove('hidden');
        } else {
          showMessage(otpMsg, data.message, 'error');
        }
      } catch (err) {
        showMessage(otpMsg, 'Server error', 'error');
      }
    });
  </script>
</body>
</html>
